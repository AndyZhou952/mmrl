name: Lint LaTeX Math

on:
  push:
    paths: ['**/*.md']
  pull_request:
    paths: ['**/*.md']

jobs:
  lint-math:
    name: Check LaTeX math for GitHub rendering compatibility
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run math linter
        run: |
          python .github/scripts/lint_math.py \
            $(find . -name '*.md' -not -path './.git/*' | sort)
